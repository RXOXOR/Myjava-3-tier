version: '3.8'

services:
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: socialdb
    ports:
      - "3307:3306"

  backend:
    build: ./backend
    container_name: tomcat_app
    depends_on:
      - db
    ports:
      - "8080:8080"
